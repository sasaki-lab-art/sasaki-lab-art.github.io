<script>

// ── RENDER ────────────────────────────────────────────────────────────────────
let currentFilter = "all";

function makePubHTML(p, isReview) {
  const doiLink = p.doi
    ? `<a class="pub-doi" href="https://doi.org/${p.doi}" target="_blank">DOI: ${p.doi}</a>`
    : "";
  const badge = isReview
    ? `<span class="review-badge">Review</span>`
    : `<span class="pub-year-badge">${p.y}</span>`;
  const prefix = isReview ? "R" : "";
  return `
    <div class="pub-item" data-year="${p.y}" data-type="${isReview ? 'review' : 'paper'}">
      <div class="pub-num">${prefix}${p.n}</div>
      <div class="pub-authors">${p.au}</div>
      <div class="pub-title">${p.ti}</div>
      <div class="pub-meta">
        <span class="pub-journal">${p.jo}</span>
        <span>${p.vp}</span>
        ${badge}
        ${doiLink}
      </div>
    </div>`;
}

function getYears() {
  // unused – kept for reference
}

// 5-year periods (first period is 1995-2000)
const PERIODS = [
  {label: "1995–2000", from: 1995, to: 2000},
  {label: "2001–2005", from: 2001, to: 2005},
  {label: "2006–2010", from: 2006, to: 2010},
  {label: "2011–2015", from: 2011, to: 2015},
  {label: "2016–2020", from: 2016, to: 2020},
  {label: "2021–2025", from: 2021, to: 2025},
  {label: "2026–2030", from: 2026, to: 2030},
];

function buildYearBtns() {
  const container = document.getElementById("year-btns");
  let html = `<button class="yr-btn active" onclick="filterPubs('all',this)">Original Articles</button>`;
  html += `<button class="yr-btn review-btn" onclick="filterPubs('review',this)">Reviews</button>`;
  container.innerHTML = html;
}

function renderList(filter) {
  const container = document.getElementById("pub-list");
  let html = "";
  let count = 0;

  // Resolve period filter
  const period = PERIODS.find(p => p.label === filter) || null;

  if (filter === "all" || period) {
    // Group papers by year descending
    const years = [...new Set(papers.map(p => p.y))].sort((a, b) => b - a);
    for (const y of years) {
      if (period && (y < period.from || y > period.to)) continue;
      const yPapers = papers.filter(p => p.y === y).sort((a, b) => b.n - a.n);
      if (!yPapers.length) continue;
      for (const p of yPapers) {
        html += makePubHTML(p, false);
        count++;
      }
    }
    // Reviews in their own section when showing all or matching period
    const filteredReviews = period
      ? [...reviews].filter(r => r.y >= period.from && r.y <= period.to)
      : [...reviews];
    if (filteredReviews.length) {
      html += `<div class="section-divider"></div>`;
      html += `<div class="year-heading" style="color:var(--purple)">総説・レビュー</div>`;
      for (const r of filteredReviews.sort((a, b) => b.y - a.y)) {
        html += makePubHTML(r, true);
        count++;
      }
    }
  } else if (filter === "review") {
    html += `<div class="year-heading" style="color:var(---purple)">総説・レビュー</div>`;
    for (const r of [...reviews].sort((a, b) => b.y - a.y)) {
      html += makePubHTML(r, true);
      count++;
    }
  }

  if (!count) {
    html = `<div class="no-results">該当する論文がありません。</div>`;
  }

  container.innerHTML = html;

  // Update count
  const label = filter === "all" ? "全件" :
                filter === "review" ? "総説" :
                filter;
  document.getElementById("count-text").innerHTML =
    `<strong>${count}</strong>件 ${label === "全件" ? "" : "（" + label + "）"}表示中`;
}

function filterPubs(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".yr-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList(filter);
}

// Init
buildYearBtns();
renderList("all");
</script>
