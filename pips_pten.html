<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal:     #1d9e75;
    --teal-lt:  #e1f5ee;
    --teal-mid: #5dcaa5;
    --coral:    #d85a30;
    --coral-lt: #faece7;
    --amber:    #ba7517;
    --amber-lt: #faeeda;
    --purple:   #534ab7;
    --purple-lt:#eeedfe;
    --bg:       #fafaf8;
    --white:    #ffffff;
    --text:     #1a1a18;
    --muted:    #6b6b65;
    --border:   #e4e4de;
    --radius:   16px;
    --nav-h:    64px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans JP', 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.75; }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: var(--nav-h); display: flex; align-items: center;
  }
  .nav-inner { max-width: 1100px; margin: auto; width: 100%; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; }
  .nav-univ-logo { height: 44px; width: auto; display: block; }
  .nav-univ-logo:hover { opacity: 0.85; }
  .nav-links { display: flex; gap: 0.25rem; }
  .nav-links a { text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 20px; transition: all 0.2s; }
  .nav-links a:hover { background: var(--teal-lt); color: var(--teal); }
  @media (max-width: 860px) {
    .nav-univ-logo { height: 32px; }
    .nav-links a { font-size: 12px; padding: 5px 8px; }
  }
  @media (max-width: 540px) {
  }

  /* ── PAGE HEADER ── */
  .page-header {
    background: linear-gradient(135deg, var(--teal-lt) 0%, #f0faf5 100%);
    padding: 64px 2rem 56px;
    border-bottom: 1px solid var(--border);
  }
  .page-header-inner { max-width: 1100px; margin: auto; }
  .section-tag { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--teal); background: white; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; border: 1px solid var(--teal-lt); }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 2.4rem; line-height: 1.25; margin-bottom: 1rem; }
  .page-lead { color: var(--muted); font-size: 15px; max-width: 760px; line-height: 1.8; }

  /* ── ARTICLE ── */
  .article-wrap { max-width: 1100px; margin: 0 auto; padding: 48px 2rem 80px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--teal); text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 2rem; }
  .back-link:hover { text-decoration: underline; }

  /* ── COMING SOON ── */
  .coming-soon { text-align: center; padding: 90px 1rem 80px; max-width: 640px; margin: 0 auto; }
  .cs-badge { display: inline-block; font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--teal); letter-spacing: 0.02em; margin-bottom: 1.2rem; }
  .cs-line { width: 56px; height: 3px; background: var(--teal-mid); border-radius: 2px; margin: 0 auto 1.6rem; }
  .cs-text { font-family: 'DM Sans', sans-serif; color: var(--muted); font-size: 17px; line-height: 1.9; }

  /* ── FOOTER ── */
  footer { background: #1a1a18; color: #9a9a94; padding: 3rem 2rem; }
  .footer-inner { max-width: 1100px; margin: auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .footer-lab { font-family: 'DM Serif Display', serif; font-size: 18px; color: white; }
  .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .footer-links a { font-size: 13px; color: #9a9a94; text-decoration: none; }
  .footer-links a:hover { color: var(--teal-mid); }
  .footer-copy { font-size: 12px; margin-top: 0.5rem; }

  @media (max-width: 640px) {
    .page-title { font-size: 1.8rem; }
    .article-wrap { padding: 32px 1.1rem 64px; }
    .coming-soon { padding: 60px 1rem 56px; }
  }
  .nav-toggle { display: none; background: none; border: none; cursor: pointer; color: var(--text); padding: 4px; line-height: 0; }
  .nav-toggle svg { width: 28px; height: 28px; stroke: currentColor; }
  /* hamburger menu (<=768px only; desktop unchanged) */
  @media (max-width: 768px) {
    .nav-toggle { display: block; }
    .nav-links {
      position: absolute; top: 100%; left: 0; right: 0;
      flex-direction: column; gap: 0; max-width: none;
      background: rgba(255,255,255,0.98); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    }
    .nav-links.open { max-height: 80vh; }
    .nav-links a { font-size: 15px; padding: 14px 2rem; border-radius: 0; border-bottom: 1px solid var(--border); }
    .nav-links a:last-child { border-bottom: none; }
  }
</style>
</head>

<script>
(function(){
  var t = document.getElementById('navToggle');
  var m = document.getElementById('navLinks');
  if (!t || !m) return;
  var ICON_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>';
  var ICON_CLOSED = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
  function setOpen(o){ m.classList.toggle('open', o); t.setAttribute('aria-expanded', o ? 'true' : 'false'); t.innerHTML = o ? ICON_OPEN : ICON_CLOSED; }
  t.addEventListener('click', function(){ setOpen(!m.classList.contains('open')); });
  m.addEventListener('click', function(e){ if (e.target.tagName === 'A') setOpen(false); });
})();
</script>

<!-- Back-to-top button -->
<button id="backToTop" aria-label="ページの先頭へ戻る" class="back-to-top">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>
<style>
.back-to-top {
  position: fixed; bottom: 24px; right: 24px;
  width: 44px; height: 44px; border-radius: 50%;
  background: #1d9e75; color: white; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s, background 0.2s;
  transform: translateY(8px);
  z-index: 200;
}
.back-to-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
.back-to-top:hover { background: #0f6e56; }
@media (max-width: 540px) {
  .back-to-top { bottom: 16px; right: 16px; width: 40px; height: 40px; }
}
</style>
<script>
(function() {
  var btn = document.getElementById('backToTop');
  if (!btn) return;
  window.addEventListener('scroll', function() {
    if (window.scrollY > 300) btn.classList.add('visible');
    else btn.classList.remove('visible');
  });
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
